spring.application.name=simple-todo-api
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/spring_todo_db
spring.datasource.username=postgres
spring.datasource.password=00000000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

info.app.name=Simple Todo API
info.app.version=1.0.0
info.app.description=API REST simple pour la gestion de tâches
